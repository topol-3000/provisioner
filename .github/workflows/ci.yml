name: CI

# PR gate: lint + unit tests (Docker-free) + build-only Docker job.
# Per D-15: integration tests (testcontainers) are NOT on the PR gate.
# No push to any registry in M1 — build job proves the image builds only.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.11.14"   # pin uv too — keeps "works on my laptop" honest

jobs:

  # ---------------------------------------------------------------------
  # Lint: ruff check + ruff format --check. Fast. Runs in parallel with tests.
  # ---------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen --extra dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------
  # Tests: unit tests only (Docker-free). Per D-15, testcontainers
  # integration tests are off the PR gate — run locally / on-demand via
  # `make test-integration`.
  # ---------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen --extra dev

      - name: Unit tests
        run: uv run pytest -m "not integration" --cov=provisioning_worker --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------
  # Image build. Builds only — no push (D-15). Pushing to a registry is
  # wired up once a registry is decided (likely GHCR via Coolify in M2).
  # ---------------------------------------------------------------------
  build:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [lint]    # don't burn cycles on a broken-syntax PR
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: provisioning-worker:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

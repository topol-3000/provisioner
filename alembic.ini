# Alembic configuration — single named section for the provisioning schema.
#
# Usage:
#   alembic -n provisioning upgrade head
#   alembic -n provisioning revision --autogenerate -m "..."
#
# The Makefile wraps these as `make migrate` and `make revision name="..."`.
#
# DSN comes from env via env.py — do not put a sqlalchemy.url here.

# Default section. We deliberately leave script_location pointing at a
# non-existent path so an `alembic upgrade head` without `-n` errors loudly
# instead of doing the wrong thing.
[alembic]
script_location = migrations/_default_must_use_named_section
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://_unset_/_unset_

[provisioning]
script_location = migrations/provisioning
prepend_sys_path = .
version_table = alembic_version
version_table_schema = provisioning
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# -----------------------------------------------------------------------
# Logging — minimal; the app's structlog config takes over in practice.
# -----------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
